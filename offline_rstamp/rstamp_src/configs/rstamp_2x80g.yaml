experiment:
  name: "rstamp_2x80g"
  description: "Resource-efficient reasoning-guided STAMP on 2x80GB GPUs"

hardware:
  num_gpus: 2
  gpu_memory_gb: 80
  precision: "bf16"
  gradient_checkpointing: true
  deepspeed_stage: 2

model:
  base: "STAMP"
  freeze_vision_encoder: true
  freeze_llm_base: true
  train_lora: true
  lora_rank: 32
  lora_alpha: 64
  train_connector: true
  train_mask_head: true
  train_reasoning_prior_adapter: true
  train_uncertainty_refinement: false

structured_prior:
  enabled: true
  max_prior_tokens: 96
  fields:
    - target
    - attributes
    - relation
    - bbox
    - positive_points
    - negative_points
  use_long_cot: false

training:
  stage1_sft:
    micro_batch_size_per_gpu: 1
    gradient_accumulation_steps: 16
    learning_rate: 0.00003
    epochs: 1
    losses:
      mask_loss: 1.0
      prior_format_loss: 0.2
      bbox_point_aux_loss: 0.2
      boundary_loss: 0.1
  stage2_refinement:
    enabled: false
    micro_batch_size_per_gpu: 1
    gradient_accumulation_steps: 16
    learning_rate: 0.00001
  stage3_light_rl:
    enabled: false
    sampling_number: 2
    learning_rate: 0.000001
    train_modules:
      - lora
      - reasoning_prior_adapter
    rewards:
      format: 0.2
      iou: 1.0
      boundary: 0.2
      conciseness_penalty: -0.05

evaluation:
  datasets:
    - RefCOCO
    - RefCOCO+
    - RefCOCOg
    - ReasonSeg
    - gRefCOCO
  report:
    - cIoU
    - gIoU
    - boundary_f
    - inference_time
    - gpu_memory
    - complex_query_split
    - small_object_split

